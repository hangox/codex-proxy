name: Web Smoke Test

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web and backend
        run: npm run build

      - name: Run Web Smoke test
        run: npm test -- src/__tests__/web-smoke.test.ts
