appId: com.codex-proxy.app
productName: Codex Proxy
electronVersion: "35.7.5"

publish:
  provider: github
  owner: hangox
  repo: codex-proxy

artifactName: "Codex-Proxy-${version}-${os}-${arch}.${ext}"

directories:
  output: release

# Pre-pack script copies config/ and public/ from monorepo root into
# this directory. Paths here are relative to projectDir.
files:
  - dist-electron/**/*
  - config/**/*
  - public/**/*
  - node_modules/ws/**/*
  - node_modules/https-proxy-agent/**/*
  - node_modules/agent-base/**/*
  - node_modules/debug/**/*
  - node_modules/ms/**/*
  - electron/assets/**/*
  - package.json
  - "!node_modules/.bin/**/*"
  - "!node_modules/esbuild/**/*"
  - "!node_modules/@esbuild/**/*"
  - "!node_modules/**/.codex-proxy-runtime-copy"
  - "!dist"

# Static assets unpacked from asar (filesystem access at runtime)
asarUnpack:
  - "config/**/*"
  - "public/**/*"
  - "**/*.node"

# Extra resources (outside asar): cacert.pem, native addon
extraResources:
  - from: native/
    to: native/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/assets/icon.png
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  target:
    - target: dmg
    - target: zip
  icon: electron/assets/icon.png
  category: public.app-category.developer-tools
  identity: null
  hardenedRuntime: true
  gatekeeperAssess: false

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: electron/assets/icon.png
  category: Development
