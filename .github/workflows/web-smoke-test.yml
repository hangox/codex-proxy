name: CI — Web smoke test

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test frontend build and server
        run: npm test -- src/__tests__/web-smoke.test.ts
