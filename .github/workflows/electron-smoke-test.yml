name: Electron Smoke Test

on:
  push:
    branches: [ master ]
    paths:
      - 'packages/electron/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'packages/electron/**'

jobs:
  electron-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Build root project
        run: npm run build

      - name: Install Electron dependencies
        run: cd packages/electron && npm ci

      - name: Build Electron desktop frontend
        run: cd packages/electron && npm run build

      - name: Prepare pack
        run: cd packages/electron && node electron/prepare-pack.mjs

      - name: Install Playwright
        run: cd packages/electron && npx playwright install --with-deps chromium

      - name: Package Electron app
        run: cd packages/electron && npx electron-builder --linux --dir --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Electron Launch Smoke Test
        run: cd packages/electron && xvfb-run -a npx vitest run __tests__/launch/smoke.test.ts
        env:
          CI: true
