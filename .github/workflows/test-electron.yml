name: Test Electron Launch

on:
  push:
    paths:
      - 'packages/electron/**'
      - '.github/workflows/test-electron.yml'
  pull_request:
    paths:
      - 'packages/electron/**'
      - '.github/workflows/test-electron.yml'

jobs:
  test-launch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Setup curl-impersonate
        run: npx tsx scripts/setup-curl.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run launch test
        run: xvfb-run node packages/electron/electron/launch-test.mjs
